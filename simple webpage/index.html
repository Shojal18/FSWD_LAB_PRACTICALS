<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Webpage</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: linear-gradient(to right, #4facfe, #00f2fe);
        }

        header {
            background-color: #333;
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav {
            background: #555;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            color: yellow;
        }

        section {
            text-align: center;
            padding: 50px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            background-color: #ff7eb3;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background-color: #ff4e8a;
        }

        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 10px;
            position: fixed;
            width: 100%;
            bottom: 0;
        }

        #message {
            margin-top: 20px;
            font-size: 20px;
            color: white;
        }
    </style>
</head>

<body>

    <!-- Header -->
    <header>
        <h1>My Simple Website</h1>
    </header>

    <!-- Navigation -->
    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>

    <!-- Main Section -->
    <section>
        <h2>Welcome!</h2>
        <p>This is a simple webpage using HTML, CSS, and JavaScript.</p>

        <button onclick="showMessage()">Click Me</button>
        <p id="message"></p>
    </section>

    <!-- Footer -->
    <footer>
        <p>© 2026 My Website</p>
    </footer>

    <!-- JavaScript -->
    <script>
        function showMessage() {
            document.getElementById("message").innerText = "You clicked the button 🎉";
        }
    </script>

</body>
</html>
