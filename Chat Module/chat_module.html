<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Shojal's Bot</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif; background: #1c1c1e; display: flex; justify-content: center; align-items: center; min-height: 100vh; }

  .device {
    width: 390px;
    background: #000;
    border-radius: 50px;
    padding: 14px;
    box-shadow: 0 0 0 1px #3a3a3c, 0 30px 80px rgba(0,0,0,0.8), inset 0 0 0 1px #2c2c2e;
    position: relative;
  }

  .screen {
    background: #000;
    border-radius: 40px;
    overflow: hidden;
    height: 680px;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* Dynamic island */
  .dynamic-island {
    position: absolute;
    top: 12px; left: 50%; transform: translateX(-50%);
    width: 120px; height: 34px;
    background: #000;
    border-radius: 20px;
    z-index: 20;
    box-shadow: 0 0 0 1px #1c1c1e;
  }

  /* Status bar */
  .status-bar {
    padding: 18px 24px 6px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    background: #1c1c1e;
    flex-shrink: 0;
    z-index: 10;
    padding-top: 54px;
  }
  .status-right { display: flex; gap: 6px; align-items: center; font-size: 13px; }

  /* Header */
  .chat-header {
    background: rgba(28,28,30,0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    padding: 8px 16px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 0.5px solid rgba(255,255,255,0.1);
    flex-shrink: 0;
  }

  .back-btn { color: #007aff; font-size: 17px; background: none; border: none; cursor: pointer; padding: 4px; display: flex; align-items: center; gap: 2px; font-family: inherit; }
  .back-arrow { font-size: 22px; line-height: 1; }

  .header-center { flex: 1; display: flex; flex-direction: column; align-items: center; }

  .bot-avatar {
    width: 38px; height: 38px; border-radius: 50%;
    background: linear-gradient(145deg, #5e5ce6, #bf5af2);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; margin-bottom: 2px;
    flex-shrink: 0;
  }

  .header-name { font-size: 16px; font-weight: 600; color: #fff; }
  .header-sub { font-size: 12px; color: #34c759; }

  .header-right { display: flex; gap: 8px; }
  .hdr-btn { background: rgba(255,255,255,0.12); border: none; border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 15px; }

  /* Messages */
  .chat-body {
    flex: 1; overflow-y: auto; padding: 12px 16px;
    display: flex; flex-direction: column; gap: 4px;
    background: #000;
    scroll-behavior: smooth;
  }
  .chat-body::-webkit-scrollbar { display: none; }

  .msg-group { display: flex; flex-direction: column; gap: 2px; margin-bottom: 6px; }
  .msg-group.sent { align-items: flex-end; }
  .msg-group.received { align-items: flex-start; }

  .group-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .msg-group.sent .group-header { flex-direction: row-reverse; }

  .sm-avatar { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(145deg, #5e5ce6, #bf5af2); display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }

  .bubble {
    max-width: 75%;
    padding: 10px 14px;
    font-size: 16px;
    line-height: 1.4;
    word-break: break-word;
    position: relative;
  }

  .received .bubble {
    background: #1c1c1e;
    color: #fff;
    border-radius: 18px 18px 18px 4px;
  }
  .sent .bubble {
    background: #007aff;
    color: #fff;
    border-radius: 18px 18px 4px 18px;
  }

  .bubble + .bubble { margin-top: 2px; }
  .received .bubble + .bubble { border-radius: 4px 18px 18px 4px; }
  .sent .bubble + .bubble { border-radius: 18px 4px 4px 18px; }
  .received .bubble:last-child { border-radius: 4px 18px 18px 18px; }
  .sent .bubble:last-child { border-radius: 18px 4px 18px 18px; }

  .time-stamp { font-size: 11px; color: #636366; text-align: center; padding: 6px 0 4px; }

  .typing-row { display: none; align-items: flex-end; gap: 8px; }
  .typing-row.show { display: flex; }
  .typing-bubble { background: #1c1c1e; border-radius: 18px 18px 18px 4px; padding: 12px 16px; display: flex; gap: 5px; align-items: center; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #636366; animation: typingAnim 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typingAnim { 0%,100%{transform:scale(1);opacity:.4} 50%{transform:scale(1.3);opacity:1} }

  @keyframes popIn { from{opacity:0;transform:scale(0.85) translateY(6px)} to{opacity:1;transform:scale(1) translateY(0)} }
  .msg-group { animation: popIn 0.22s ease; }

  /* Footer */
  .chat-footer {
    background: rgba(28,28,30,0.95);
    backdrop-filter: blur(20px);
    padding: 10px 12px 22px;
    display: flex;
    align-items: flex-end;
    gap: 8px;
    border-top: 0.5px solid rgba(255,255,255,0.1);
    flex-shrink: 0;
  }

  .footer-icon-btn { background: none; border: none; cursor: pointer; font-size: 26px; padding: 2px; flex-shrink: 0; line-height: 1; }

  .input-wrap {
    flex: 1;
    background: #1c1c1e;
    border: 0.5px solid #3a3a3c;
    border-radius: 22px;
    display: flex;
    align-items: flex-end;
    padding: 8px 12px;
    gap: 8px;
  }

  .msg-input {
    flex: 1; background: none; border: none; outline: none;
    font-size: 16px; color: #fff; resize: none;
    font-family: -apple-system, 'SF Pro Text', sans-serif;
    line-height: 1.4; max-height: 90px; overflow-y: auto;
  }
  .msg-input::placeholder { color: #636366; }

  .emoji-inline-btn { font-size: 22px; background: none; border: none; cursor: pointer; flex-shrink: 0; line-height: 1; }

  .send-btn {
    width: 34px; height: 34px; border-radius: 50%;
    background: #007aff; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: transform 0.12s, opacity 0.2s;
  }
  .send-btn:active { transform: scale(0.9); }
  .send-btn svg { width: 16px; height: 16px; fill: #fff; }

  /* Emoji picker */
  .emoji-picker {
    position: absolute; bottom: 90px; left: 12px; right: 12px;
    background: #1c1c1e;
    border: 0.5px solid #3a3a3c;
    border-radius: 16px;
    padding: 12px;
    display: none; flex-wrap: wrap; gap: 4px;
    z-index: 30;
    box-shadow: 0 -4px 30px rgba(0,0,0,0.5);
  }
  .emoji-picker.show { display: flex; }
  .ep-btn { background: none; border: none; cursor: pointer; font-size: 26px; border-radius: 8px; padding: 6px; width: 48px; text-align: center; transition: background 0.15s; }
  .ep-btn:hover { background: rgba(255,255,255,0.08); }
</style>
</head>
<body>
<div class="device">
  <div class="screen">
    <div class="dynamic-island"></div>

    <div class="status-bar">
      <span>9:41</span>
      <div class="status-right">
        <span>&#9679;&#9679;&#9679;&#9679;</span>
        <span>WiFi</span>
        <span>🔋</span>
      </div>
    </div>

    <div class="chat-header">
      <button class="back-btn"><span class="back-arrow">‹</span> <span style="font-size:13px">3</span></button>
      <div class="header-center">
        <div class="bot-avatar">🤖</div>
        <div class="header-name">Shojal's Bot</div>
        <div class="header-sub">● Online</div>
      </div>
      <div class="header-right">
        <button class="hdr-btn">📞</button>
        <button class="hdr-btn">🎥</button>
      </div>
    </div>

    <div class="chat-body" id="chatBody">
      <div class="time-stamp">Today 9:41 AM</div>

      <div class="msg-group received">
        <div class="sm-avatar">🤖</div>
        <div class="bubble">Hey there! 👋 I'm Shojal's Bot.</div>
        <div class="bubble">How can I help you today? 😊</div>
      </div>

      <div class="msg-group sent">
        <div class="bubble">Hey bot! What can you do? 🤔</div>
      </div>

      <div class="msg-group received">
        <div class="sm-avatar">🤖</div>
        <div class="bubble">I can chat, answer questions, and keep you company! 🚀✨</div>
      </div>

      <div class="typing-row" id="typingRow">
        <div class="sm-avatar">🤖</div>
        <div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
      </div>
    </div>

    <div class="emoji-picker" id="emojiPicker">
      <button class="ep-btn">😊</button><button class="ep-btn">😂</button><button class="ep-btn">🥰</button>
      <button class="ep-btn">😎</button><button class="ep-btn">🤔</button><button class="ep-btn">😅</button>
      <button class="ep-btn">🙌</button><button class="ep-btn">👍</button><button class="ep-btn">❤️</button>
      <button class="ep-btn">🔥</button><button class="ep-btn">🎉</button><button class="ep-btn">💯</button>
      <button class="ep-btn">🚀</button><button class="ep-btn">✨</button><button class="ep-btn">😢</button>
      <button class="ep-btn">👏</button><button class="ep-btn">🤩</button><button class="ep-btn">💬</button>
    </div>

    <div class="chat-footer">
      <button class="footer-icon-btn" id="emojiToggle">🙂</button>
      <div class="input-wrap">
        <textarea class="msg-input" id="msgInput" placeholder="iMessage" rows="1"></textarea>
        <button class="emoji-inline-btn" id="emojiInline">😀</button>
      </div>
      <button class="send-btn" id="sendBtn">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
const chatBody = document.getElementById('chatBody');
const msgInput = document.getElementById('msgInput');
const sendBtn = document.getElementById('sendBtn');
const typingRow = document.getElementById('typingRow');
const emojiPicker = document.getElementById('emojiPicker');
const emojiToggle = document.getElementById('emojiToggle');
const emojiInline = document.getElementById('emojiInline');

const replies = [
  ["That's super cool! 🔥", "Tell me more! 😄"],
  ["Haha, love that! 😂✨"],
  ["Interesting… 🤔 I'll have to think about that!"],
  ["You're amazing! 🥰", "Seriously! 💯"],
  ["lol same honestly 😅"],
  ["Wow, didn't know that! 😮🎉"],
  ["Totally agree with you! 👍"],
  ["Let's vibe then! 🚀✨"],
  ["That made my day! 😊❤️"],
  ["Big facts! 🙌🔥"]
];

function getTime() {
  return new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}

function addMsg(texts, type) {
  const grp = document.createElement('div');
  grp.className = `msg-group ${type}`;
  if (type === 'received') {
    const av = document.createElement('div');
    av.className = 'sm-avatar'; av.textContent = '🤖';
    grp.appendChild(av);
  }
  texts.forEach(t => {
    const b = document.createElement('div');
    b.className = 'bubble'; b.textContent = t;
    grp.appendChild(b);
  });
  chatBody.insertBefore(grp, typingRow);
  chatBody.scrollTop = chatBody.scrollHeight;
}

function send() {
  const txt = msgInput.value.trim();
  if (!txt) return;
  addMsg([txt], 'sent');
  msgInput.value = ''; msgInput.style.height = 'auto';

  typingRow.classList.add('show');
  chatBody.scrollTop = chatBody.scrollHeight;

  setTimeout(() => {
    typingRow.classList.remove('show');
    const r = replies[Math.floor(Math.random() * replies.length)];
    addMsg(r, 'received');
  }, 1200 + Math.random() * 800);
}

sendBtn.addEventListener('click', send);
msgInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } });
msgInput.addEventListener('input', () => { msgInput.style.height = 'auto'; msgInput.style.height = Math.min(msgInput.scrollHeight, 90) + 'px'; });

function togglePicker(e) { e.stopPropagation(); emojiPicker.classList.toggle('show'); }
emojiToggle.addEventListener('click', togglePicker);
emojiInline.addEventListener('click', togglePicker);

document.querySelectorAll('.ep-btn').forEach(b => {
  b.addEventListener('click', () => { msgInput.value += b.textContent; msgInput.focus(); emojiPicker.classList.remove('show'); });
});
document.addEventListener('click', () => emojiPicker.classList.remove('show'));
</script>
</body>
</html>
